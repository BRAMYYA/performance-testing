{% extends 'base.html' %}
{% block title %}Login | PerfHub{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow">
  <h1 class="text-2xl font-bold mb-4">Login</h1>
  <form method="post" class="space-y-4">
    <input class="w-full border rounded px-3 py-2" type="text" name="username" placeholder="Username" required />
    <input class="w-full border rounded px-3 py-2" type="password" name="password" placeholder="Password" required />
    <button class="w-full bg-cyan-600 hover:bg-cyan-700 text-white py-2 rounded" type="submit">Sign In</button>
  </form>
  <p class="mt-4 text-sm">No account? <a class="text-cyan-600" href="{{ url_for('register') }}">Register</a></p>
</div>
{% endblock %}
